name: docker

# Builds the nsld multi-arch Docker image and pushes it to Docker Hub.
#
# **Manual trigger only.** A `release: published` trigger was tried but
# events fired by `GITHUB_TOKEN` (which is what release.yml uses to
# create the GitHub Release) do not cascade to other workflows by GHA
# design — see the docs on "Workflow runs from workflow events". So
# we leave docker publishes as an explicit operator action:
#
#     gh workflow run docker --repo dotns/nsl -f tag=v0.1.5
#
# Pass an existing release tag whose `nsld-linux-x64.tar.gz` and
# `nsld-linux-arm64.tar.gz` assets are already on the GitHub Release.
#
# Required repo secrets:
#   DOCKER_USER : Docker Hub account name
#   DOCKER_PWD  : Docker Hub access token (Account Settings → Security)
#
# Image: docker.io/dotns/nsld:<version> + :latest

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag whose assets to package (e.g. v0.1.5)"
        required: true

env:
  IMAGE_NAME: dotns/nsld

jobs:
  push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve tag
        id: tag
        run: |
          set -eu
          name="${{ github.event.inputs.tag }}"
          echo "name=$name" >> "$GITHUB_OUTPUT"

      - name: Download nsld binaries from release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -eu
          mkdir -p docker-context/linux-amd64 docker-context/linux-arm64 release-assets
          gh release download "${{ steps.tag.outputs.name }}" \
            --pattern 'nsld-linux-x64.tar.gz' \
            --pattern 'nsld-linux-arm64.tar.gz' \
            --dir release-assets
          tar -xzf release-assets/nsld-linux-x64.tar.gz   -C docker-context/linux-amd64
          tar -xzf release-assets/nsld-linux-arm64.tar.gz -C docker-context/linux-arm64
          cp crates/nsld/Dockerfile docker-context/Dockerfile
          ls -laR docker-context/

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.tag.outputs.name }}
            type=raw,value=latest

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PWD }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: docker-context
          file: docker-context/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
